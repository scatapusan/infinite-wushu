<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WuXue — Logo Lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: rgb(var(--background)); }
  .card { padding: 28px; display: flex; align-items: center; gap: 48px; min-height: 150px; }
  .mark { display: flex; align-items: center; gap: 14px; }
  .zhmark { font-family: var(--font-chinese); font-weight: 700; color: var(--accent-gold); font-size: 44px; line-height: 1; }
  .wm { display: flex; flex-direction: column; line-height: 1.05; }
  .wm-name { font-family: var(--font-sans); font-weight: 700; color: var(--accent-cyan); font-size: 20px; letter-spacing: 0.02em; }
  .wm-tag { font-family: var(--font-sans); font-weight: 500; color: var(--fg-4); font-size: 10px; letter-spacing: 0.1em; margin-top: 2px; }
  .sep { width: 1px; height: 56px; background: rgba(255,255,255,0.08); }
  .hero { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .hero-eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3em; color: rgb(var(--cyan) / 0.7); }
  .hero-zh { font-family: var(--font-chinese); font-weight: 700; color: var(--accent-gold); font-size: 72px; line-height: 1; }
</style>
</head>
<body>
<div class="card">
  <div class="mark" title="standard header lockup">
    <span class="zhmark">武学</span>
    <div class="wm">
      <span class="wm-name">WuXue</span>
      <span class="wm-tag">by Infinite Wushu</span>
    </div>
  </div>
  <div class="sep"></div>
  <div class="hero" title="landing hero variant">
    <span class="hero-eyebrow">Infinite Wushu</span>
    <span class="hero-zh">武学</span>
  </div>
</div>
</body>
</html>
