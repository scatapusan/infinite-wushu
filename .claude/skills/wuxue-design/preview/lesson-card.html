<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WuXue — Lesson Card States</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: rgb(var(--background)); font-family: var(--font-sans); }
  .wrap { padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: #0d1328; border: 1px solid rgba(0,180,230,0.12); border-radius: 16px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; }
  .num { height: 36px; width: 36px; border-radius: 999px; background: rgba(255,255,255,0.04); display:flex; align-items:center; justify-content:center; font-family: var(--font-chinese); font-weight: 700; font-size: 14px; color: var(--accent-gold); flex-shrink:0; }
  .title { font-size: 15px; font-weight: 700; color: var(--fg-1); }
  .bili { font-size: 13px; margin-top: 2px; }
  .py { font-style: italic; color: var(--fg-3); }
  .zh { font-family: var(--font-chinese); color: rgba(212,160,48,0.8); margin-left: 8px; font-weight: 700; font-size: 14px; }
  .status { font-size: 11px; font-weight: 600; margin-top: 4px; color: var(--accent-cyan); }
  .status.locked { color: var(--fg-4); }
  .icon { color: var(--accent-cyan); flex-shrink:0; }
  .icon.locked { color: var(--fg-4); }
  .card.locked { opacity: 0.5; }
  svg { display: block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="num">一</div>
    <div style="flex:1; min-width:0;">
      <div class="title">Horse Stance</div>
      <div class="bili"><span class="py">mǎbù</span><span class="zh">馬步</span></div>
      <div class="status" style="color: var(--accent-cyan);">Completed · 92%</div>
    </div>
    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="card">
    <div class="num">二</div>
    <div style="flex:1; min-width:0;">
      <div class="title">Bow Stance</div>
      <div class="bili"><span class="py">gōngbù</span><span class="zh">弓步</span></div>
      <div class="status">In progress</div>
    </div>
    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
  </div>
  <div class="card locked">
    <div class="num" style="color: var(--fg-4);">三</div>
    <div style="flex:1; min-width:0;">
      <div class="title">Empty Stance</div>
      <div class="bili"><span class="py">xūbù</span><span class="zh">虛步</span></div>
      <div class="status locked">Locked — complete Bow Stance first</div>
    </div>
    <svg class="icon locked" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
</div>
</body>
</html>
