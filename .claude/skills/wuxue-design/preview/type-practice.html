<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WuXue — Practice Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #050B1A; font-family: var(--font-sans); color: #fff; }
  .wrap { padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .meta { font-size: 10px; color: rgba(255,255,255,0.45); font-family: ui-monospace, monospace; text-transform: uppercase; letter-spacing: 0.15em; width: 140px; flex-shrink: 0; }
  .floor { font-size: 10px; color: #FF3355; font-family: ui-monospace, monospace; letter-spacing: 0.1em; padding: 10px 24px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="meta">Hero · 80px · 900</span><span style="font-size: 80px; font-weight: 900; line-height: 1; color: #00FF88; text-shadow: 0 0 30px #00FF8855;">85</span></div>
  <div class="row"><span class="meta">Large · 56px · 800</span><span style="font-size: 56px; font-weight: 900; line-height: 1; color: #FFD700; letter-spacing: 0.02em;">LOWER HIPS</span></div>
  <div class="row"><span class="meta">Medium · 40px · 700</span><span style="font-size: 40px; font-weight: 700;">Practice Again</span></div>
  <div class="row"><span class="meta">Small · 28px · 600</span><span style="font-size: 28px; font-weight: 600; color: rgba(255,255,255,0.8);">Movement 2 of 5</span></div>
</div>
<div class="floor">↑ 28px floor · nothing smaller appears in the practice surface</div>
</body>
</html>
