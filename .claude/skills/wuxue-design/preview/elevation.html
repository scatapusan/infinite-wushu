<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WuXue — Elevation & Glow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;900&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: rgb(var(--background)); font-family: var(--font-sans); }
  .wrap { padding: 20px 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: center; }
  .cell { background: #0d1328; border: 1px solid rgba(0,180,230,0.12); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 6px; min-height: 100px; justify-content: center; }
  .cell .lab { font-size: 10px; color: rgb(var(--cyan) / 0.7); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="cell">
    <div class="lab">Flat surface</div>
    <div style="color: var(--fg-3); font-size: 11px; font-family: ui-monospace, monospace;">border + fill only</div>
    <div style="color: var(--fg-4); font-size: 10px; margin-top: 4px;">no drop shadow</div>
  </div>
  <div class="cell" style="border-color: rgba(0,180,230,0.4);">
    <div class="lab" style="color: rgb(var(--cyan));">Hover</div>
    <div style="color: var(--fg-3); font-size: 11px; font-family: ui-monospace, monospace;">border → cyan/40</div>
  </div>
  <div class="cell" style="background: #050B1A; border-color: transparent;">
    <div style="font-size: 48px; font-weight: 900; color: #00FF88; text-shadow: 0 0 30px #00FF8855;">85</div>
    <div class="lab" style="color: rgba(255,255,255,0.45);">Score glow</div>
  </div>
</div>
</body>
</html>
