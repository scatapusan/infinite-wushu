<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WuXue — Progress Bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: rgb(var(--background)); font-family: var(--font-sans); }
  .wrap { padding: 20px 24px; }
  .card { background: #0d1328; border: 1px solid rgba(0,180,230,0.12); border-radius: 16px; padding: 20px; }
  .eb { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; color: rgb(var(--cyan) / 0.7); }
  .row { display: flex; justify-content: space-between; align-items: baseline; }
  .title { font-size: 20px; font-weight: 700; color: var(--fg-1); margin-top: 4px; }
  .pct { font-family: var(--font-chinese); font-size: 30px; font-weight: 700; color: var(--accent-cyan); }
  .bar { height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; margin-top: 14px; }
  .fill { height: 100%; background: linear-gradient(90deg, #00b4e6, #d4a030); border-radius: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="row">
      <div>
        <div class="eb">Your journey</div>
        <div class="title">5 of 13 lessons complete</div>
      </div>
      <div class="pct">38%</div>
    </div>
    <div class="bar"><div class="fill" style="width: 38%;"></div></div>
  </div>
</div>
</body>
</html>
