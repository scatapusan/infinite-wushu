<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WuXue — Type Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: rgb(var(--background)); font-family: var(--font-sans); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .meta { font-size: 10px; color: var(--fg-4); font-family: ui-monospace, monospace; text-transform: uppercase; letter-spacing: 0.1em; width: 140px; flex-shrink: 0; }
  .t { color: var(--fg-1); }
  .eb { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; color: rgb(var(--cyan) / 0.7); }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="meta">H3 · 18px · 700</span><span class="t" style="font-size: 18px; font-weight: 700;">Horse Stance</span></div>
  <div class="row"><span class="meta">Body · 16px · 400</span><span class="t" style="font-size: 16px;">Stand in frame to begin practice.</span></div>
  <div class="row"><span class="meta">Body sm · 14px</span><span class="t" style="font-size: 14px; color: var(--fg-2);">A progressive curriculum from stances to forms.</span></div>
  <div class="row"><span class="meta">Caption · 11px</span><span class="t" style="font-size: 11px; color: var(--fg-3);">Completed · 92%</span></div>
  <div class="row"><span class="meta">Eyebrow · 11px</span><span class="eb">Your journey</span></div>
  <div class="row"><span class="meta">Pinyin · italic</span><span class="t" style="font-size: 14px; font-style: italic; color: var(--fg-3);">mǎbù · bùxíng · chángquán</span></div>
  <div class="row"><span class="meta">Chinese · gold</span><span class="t" style="font-family: var(--font-chinese); font-size: 22px; font-weight: 700; color: var(--accent-gold);">馬步 · 步型 · 長拳</span></div>
</div>
</body>
</html>
