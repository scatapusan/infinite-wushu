<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WuXue — Input & Search</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: rgb(var(--background)); font-family: var(--font-sans); }
  .wrap { padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .field { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(0,180,230,0.15); background: rgba(255,255,255,0.03); color: var(--fg-1); font-family: inherit; font-size: 14px; box-sizing: border-box; }
  .field:focus { outline: none; border-color: rgba(0,180,230,0.6); background: rgba(255,255,255,0.06); }
  .field::placeholder { color: var(--fg-4); }
  .search { position: relative; }
  .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--fg-4); }
  .search input { padding-left: 38px; }
  .banner { border-radius: 12px; padding: 12px 16px; font-size: 13px; font-weight: 500; }
  .banner.info { background: rgba(0,180,230,0.1); border: 1px solid rgba(0,180,230,0.3); color: var(--accent-cyan); }
  .banner.err { background: rgba(232,93,74,0.1); border: 1px solid rgba(232,93,74,0.4); color: var(--danger); }
</style>
</head>
<body>
<div class="wrap">
  <input class="field" type="email" placeholder="Email address" value="student@infinitewushu.com">
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="field" placeholder="Search vocab…">
  </div>
  <div class="banner info">Check your email for a confirmation link, then sign in below.</div>
</div>
</body>
</html>
