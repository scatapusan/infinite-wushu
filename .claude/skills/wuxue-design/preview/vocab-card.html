<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WuXue — Vocab Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: rgb(var(--background)); font-family: var(--font-sans); }
  .wrap { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .card { border-radius: 12px; border: 1px solid; padding: 16px; }
  .card.stance { background: rgba(0,180,230,0.04); border-color: rgba(0,180,230,0.2); }
  .card.fist { background: rgba(212,160,48,0.05); border-color: rgba(212,160,48,0.25); }
  .card.kick  { background: rgba(232,93,74,0.04); border-color: rgba(232,93,74,0.2); }
  .zh { font-family: var(--font-chinese); font-size: 38px; font-weight: 700; color: var(--accent-gold); line-height: 1; display: flex; align-items: flex-start; gap: 6px; }
  .speak { width: 18px; height: 18px; border-radius: 999px; border: 1px solid rgba(0,180,230,0.4); color: var(--accent-cyan); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; margin-top: 10px; flex-shrink: 0; }
  .py { font-style: italic; color: var(--fg-3); font-size: 13px; margin-top: 6px; }
  .en { font-size: 13px; font-weight: 600; color: var(--fg-1); margin-top: 2px; }
  .meta { font-size: 10px; color: rgb(var(--cyan) / 0.6); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 10px; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card stance">
    <div class="zh">馬步<span class="speak">♪</span></div>
    <div class="py">mǎbù</div>
    <div class="en">Horse Stance</div>
    <div class="meta">Stance</div>
  </div>
  <div class="card fist">
    <div class="zh">沖拳<span class="speak">♪</span></div>
    <div class="py">chōngquán</div>
    <div class="en">Thrust Punch</div>
    <div class="meta">Hand · Fist</div>
  </div>
  <div class="card kick">
    <div class="zh">彈腿<span class="speak">♪</span></div>
    <div class="py">tántuǐ</div>
    <div class="en">Snap Kick</div>
    <div class="meta">Kick</div>
  </div>
</div>
</body>
</html>
