<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WuXue — Core Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: rgb(var(--background)); font-family: var(--font-sans); }
  .wrap { padding: 20px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); }
  .chip { height: 80px; }
  .meta { padding: 10px 12px; background: rgba(255,255,255,0.02); }
  .name { font-size: 13px; font-weight: 700; color: var(--fg-1); }
  .hex { font-size: 11px; font-family: ui-monospace, monospace; color: var(--fg-3); letter-spacing: 0.02em; margin-top: 2px; }
  .role { font-size: 10px; color: rgb(var(--cyan) / 0.7); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw">
    <div class="chip" style="background:#080c1a; border-bottom:1px solid rgba(255,255,255,0.05);"></div>
    <div class="meta"><div class="name">Ink</div><div class="hex">#080C1A</div><div class="role">Background</div></div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#0d1328;"></div>
    <div class="meta"><div class="name">Surface</div><div class="hex">#0D1328</div><div class="role">Cards</div></div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#00b4e6;"></div>
    <div class="meta"><div class="name">Cyan</div><div class="hex">#00B4E6</div><div class="role">Primary</div></div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#d4a030;"></div>
    <div class="meta"><div class="name">Gold</div><div class="hex">#D4A030</div><div class="role">Chinese · Accent</div></div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#e85d4a;"></div>
    <div class="meta"><div class="name">Crimson</div><div class="hex">#E85D4A</div><div class="role">Destructive</div></div>
  </div>
</div>
</body>
</html>
